<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЖД Помощник</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <button id="toggleSidebarBtn" class="menu-btn">☰</button>
            <h1 class="app-title">ЖД Помощник</h1>
            <button id="profileBtn" class="profile-btn">👤</button>
        </header>

        <div class="main-content">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>История чатов</h2>
                    <button id="newChatBtn" class="new-chat-btn">+ Новый</button>
                </div>
                <div id="chatList" class="chat-list"></div>
            </div>

            <div class="chat-window">
                <div id="messages" class="messages">
                    <div class="welcome-message">
                        <h3>Добро пожаловать, <span id="userDisplay"></span>!</h3>
                        <p>Задайте вопрос по аварийной ситуации на железной дороге.</p>
                    </div>
                </div>
                <div class="input-area">
                    <input type="text" id="userInput" placeholder="Введите ваш вопрос..." autocomplete="off">
                    <button id="sendBtn" class="send-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно профиля -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Профиль</h2>
                <span class="close">&times;</span>
            </div>
            <div class="profile-info">
                <div class="profile-item">
                    <span class="label">Пользователь:</span>
                    <span id="userName" class="value"></span>
                </div>
            </div>
            <div class="modal-actions">
                <button id="logoutBtn" class="btn-danger">Выйти</button>
                <button id="closeProfileBtn" class="btn-secondary">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно подтверждения удаления чата -->
    <div id="deleteConfirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Подтверждение удаления</h2>
                <span class="close">&times;</span>
            </div>
            <p>Вы уверены, что хотите удалить этот чат? Все сообщения будут потеряны.</p>
            <div class="modal-actions">
                <button id="confirmDeleteBtn" class="btn-danger">Удалить</button>
                <button id="cancelDeleteBtn" class="btn-secondary">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно выбора геолокации -->
    <div id="locationModal" class="modal">
        <div class="modal-content location-modal">
            <div class="modal-header">
                <h2>📍 Выберите местоположение</h2>
                <span class="close">&times;</span>
            </div>
            <div class="location-options">
                <button id="useDeviceLocation" class="location-option-btn">
                    <span class="option-icon">📱</span>
                    <span class="option-text">Использовать GPS устройства</span>
                </button>
                <button id="useMapLocation" class="location-option-btn">
                    <span class="option-icon">🗺️</span>
                    <span class="option-text">Выбрать на карте</span>
                </button>
                <button id="useManualLocation" class="location-option-btn">
                    <span class="option-icon">⌨️</span>
                    <span class="option-text">Ввести координаты вручную</span>
                </button>
            </div>
            <div id="mapContainer" class="map-container" style="display: none;">
                <div id="map" class="map-view"></div>
                <button id="confirmMapLocation" class="btn-primary" style="margin-top: 10px;">Подтвердить местоположение</button>
            </div>
            <div id="manualLocationContainer" class="manual-location-container" style="display: none;">
                <div class="input-group">
                    <label for="latitudeInput">Широта (latitude):</label>
                    <input type="number" id="latitudeInput" placeholder="55.751244" step="0.000001" min="-90" max="90" step="0.000001">
                </div>
                <div class="input-group">
                    <label for="longitudeInput">Долгота (longitude):</label>
                    <input type="number" id="longitudeInput" placeholder="37.618423" step="0.000001" min="-180" max="180" step="0.000001">
                </div>
                <button id="confirmManualLocation" class="btn-primary" style="margin-top: 10px;">Подтвердить координаты</button>
                <div id="manualLocationError" class="location-status error" style="display: none; margin-top: 10px;"></div>
            </div>
            <div id="locationStatus" class="location-status"></div>
        </div>
    </div>

    <script src="https://api-maps.yandex.ru/2.1/?apikey=&lang=ru_RU" type="text/javascript"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>

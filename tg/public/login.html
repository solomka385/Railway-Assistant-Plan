<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация | ЖД Помощник</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="30" cy="30" r="28" fill="#E31E24" stroke="white" stroke-width="2"/>
                    <path d="M18 30L24 20L36 20L42 30L36 40L24 40L18 30Z" fill="white"/>
                    <rect x="22" y="24" width="16" height="4" fill="#E31E24"/>
                    <circle cx="24" cy="34" r="3" fill="white"/>
                    <circle cx="36" cy="34" r="3" fill="white"/>
                </svg>
            </div>
            <h1>ЖД Помощник</h1>
            <div class="tab-buttons">
                <button id="loginTab" class="tab-button active">Вход</button>
                <button id="registerTab" class="tab-button">Регистрация</button>
            </div>
            <form id="loginForm" class="auth-form active">
                <div class="input-group">
                    <label for="loginUsername">Логин</label>
                    <input type="text" id="loginUsername" name="username" required>
                </div>
                <div class="input-group">
                    <label for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" name="password" required>
                </div>
                <button type="submit" class="btn-primary">Войти</button>
            </form>
            <form id="registerForm" class="auth-form">
                <div class="input-group">
                    <label for="registerUsername">Логин</label>
                    <input type="text" id="registerUsername" name="username" required>
                </div>
                <div class="input-group">
                    <label for="registerPassword">Пароль</label>
                    <input type="password" id="registerPassword" name="password" required>
                </div>
                <button type="submit" class="btn-primary">Зарегистрироваться</button>
            </form>
            <div id="message" class="error-message"></div>
        </div>
    </div>

    <style>
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-button {
            flex: 1;
            padding: 10px;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 16px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .tab-button.active {
            background: var(--rzd-red);
            color: white;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
    </style>

    <script>
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
            messageDiv.textContent = '';
        });

        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.classList.add('active');
            loginForm.classList.remove('active');
            messageDiv.textContent = '';
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    messageDiv.textContent = data.error || 'Ошибка входа';
                }
            } catch (err) {
                messageDiv.textContent = 'Сетевая ошибка';
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });
                const data = await res.json();
                if (res.ok) {
                    messageDiv.style.color = 'green';
                    messageDiv.textContent = 'Регистрация успешна! Теперь войдите.';
                    // Переключаем на вкладку входа
                    loginTab.click();
                } else {
                    messageDiv.style.color = 'var(--rzd-red)';
                    messageDiv.textContent = data.error || 'Ошибка регистрации';
                }
            } catch (err) {
                messageDiv.textContent = 'Сетевая ошибка';
            }
        });
    </script>
</body>
</html>
